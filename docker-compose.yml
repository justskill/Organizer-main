services:
  inventory-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
    ports:
      - "${HOST_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      inventory-db:
        condition: service_healthy
    environment:
      INVENTORY_DATABASE_URL: ${INVENTORY_DATABASE_URL:-postgresql+asyncpg://inventory:inventory@inventory-db:5432/inventory}
      INVENTORY_SECRET_KEY: ${INVENTORY_SECRET_KEY:-change-me-in-production}
      INVENTORY_ACCESS_TOKEN_EXPIRE_MINUTES: ${INVENTORY_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      INVENTORY_ALGORITHM: ${INVENTORY_ALGORITHM:-HS256}
      INVENTORY_MEDIA_PATH: ${INVENTORY_MEDIA_PATH:-/data/media}
      INVENTORY_LABELS_PATH: ${INVENTORY_LABELS_PATH:-/data/labels}
      INVENTORY_MAX_UPLOAD_SIZE_BYTES: ${INVENTORY_MAX_UPLOAD_SIZE_BYTES:-52428800}
      INVENTORY_ALLOWED_ORIGINS: ${INVENTORY_ALLOWED_ORIGINS:-["http://localhost:3000"]}
      INVENTORY_API_PORT: ${INVENTORY_API_PORT:-8000}
      INVENTORY_DEBUG: ${INVENTORY_DEBUG:-false}
    ports:
      - "${HOST_API_PORT:-8000}:8000"
    volumes:
      - media_data:/data/media
      - labels_data:/data/labels

  inventory-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - inventory-api
    ports:
      - "${HOST_WEB_PORT:-3000}:80"

  # --- Optional: Reverse Proxy ---
  # Uncomment the service below to add SSL termination and custom domain support.
  # Update the Caddyfile or traefik config to match your domain and cert setup.
  #
  # reverse-proxy:
  #   image: caddy:2-alpine
  #   restart: unless-stopped
  #   depends_on:
  #     - inventory-web
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_certificates:/config
  #   # Example Caddyfile content:
  #   #   your-domain.example.com {
  #   #     reverse_proxy inventory-web:80
  #   #   }

volumes:
  pgdata:
  media_data:
  labels_data:
  # caddy_data:
  # caddy_certificates:
